<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bud's Pest Control - Northern Michigan</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d5016 0%, #1e350d 100%);
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            text-align: center;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(244, 160, 36, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .logo {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .logo span {
            color: #f4a024;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        h1 span {
            color: #f4a024;
        }

        p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .badge {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 0.75rem 1.5rem;
            display: inline-block;
        }

        .badge span {
            color: #ffd166;
            font-weight: 600;
        }

        .phone {
            display: inline-block;
            background-color: #f4a024;
            color: #1a1a1a;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.5rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Bud's <span>Pest Control</span></div>
        <h1>Reliable Pest Control in <span>Northern Michigan</span></h1>
        <p>Professional pest control services protecting your home and business.</p>
        <div class="badge">
            ✨ Serving <span>Harbor Springs, Petoskey</span> & Surrounding Areas
        </div>
        <br>
        <a href="tel:9064304959" class="phone">📞 906-430-4959</a>
        <br>
        <a href="mailto:budspestcontrol1@gmail.com" class="phone" style="background-color: transparent; border: 2px solid #f4a024; color: #f4a024; margin-left: 1rem;">✉️ budspestcontrol1@gmail.com</a>
    </div>
</body>
</html>
